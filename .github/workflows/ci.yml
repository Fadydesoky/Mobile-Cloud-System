name: CI Pipeline

on:
  push:
    branches: [main, enhancement/comprehensive-improvements]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  # ============================
  # Backend (Python)
  # ============================
  backend:
    name: Backend Validation & Tests
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flask redis flake8 pytest pytest-cov gunicorn python-dotenv

      - name: Syntax check (Lab2)
        run: python -m py_compile Lab2/app.py

      - name: Syntax check (Lab3)
        run: python -m py_compile Lab3/app.py

      - name: Lint with flake8 (Lab2)
        run: |
          flake8 Lab2/app.py --max-line-length=100 --count --statistics || true

      - name: Lint with flake8 (Lab3)
        run: |
          flake8 Lab3/app.py --max-line-length=100 --count --statistics || true

      - name: Run unit tests (Lab3)
        run: |
          python -m pytest Lab3/tests/test_app.py -v --cov=Lab3 --cov-report=term-missing

      - name: Run unit tests (Lab2)
        run: |
          python -m pytest Lab2/tests/test_redis_app.py -v --cov=Lab2 --cov-report=term-missing

      - name: Generate coverage report
        run: |
          pip install coverage
          coverage report --fail-under=70 || echo "Coverage below 70%"

  # ============================
  # Frontend (React)
  # ============================
  frontend:
    name: Frontend Build & Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        run: npm run build

      - name: Check build output
        run: |
          if [ -d "frontend/build" ]; then
            echo "Build successful"
            ls -la frontend/build/ | head -20
          else
            echo "Build failed: no build directory"
            exit 1
          fi

  # ============================
  # Docker Build Validation
  # ============================
  docker:
    name: Docker Build Validation
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build Docker image (Lab3 Basic)
        uses: docker/build-push-action@v4
        with:
          file: Lab3/Dockerfile.basic
          tags: mobile-cloud-system:latest
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Docker image (Lab3 Multistage)
        uses: docker/build-push-action@v4
        with:
          file: Lab3/Dockerfile.multistage
          tags: mobile-cloud-system:multistage
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================
  # Kubernetes Validation
  # ============================
  kubernetes:
    name: Kubernetes Manifests Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install kubeval
        run: |
          wget https://github.com/instrumenta/kubeval/releases/latest/download/kubeval-linux-amd64.tar.gz
          tar xf kubeval-linux-amd64.tar.gz
          sudo mv kubeval /usr/local/bin

      - name: Validate Lab3 K8s manifests
        run: |
          for file in Lab3/k8s/*.yaml; do
            echo "Validating $file"
            kubeval "$file" || true
          done

      - name: Validate Lab2 K8s manifests
        run: |
          for file in Lab2/k8s/*.yaml; do
            echo "Validating $file"
            kubeval "$file" || true
          done

  # ============================
  # Security Scanning
  # ============================
  security:
    name: Security Scanning
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

  # ============================
  # Deploy Frontend to GitHub Pages
  # ============================
  deploy:
    name: Deploy Frontend (GitHub Pages)
    runs-on: ubuntu-latest
    needs: [frontend, docker, kubernetes]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    environment: 
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install & Build
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./frontend/build

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # ============================
  # Status Check
  # ============================
  status:
    name: CI Status Check
    runs-on: ubuntu-latest
    needs: [backend, frontend, docker, kubernetes, security]
    if: always()

    steps:
      - name: Check job statuses
        run: |
          if [[ "${{ needs.backend.result }}" == "failure" || 
                "${{ needs.frontend.result }}" == "failure" || 
                "${{ needs.docker.result }}" == "failure" || 
                "${{ needs.kubernetes.result }}" == "failure" ]]; then
            echo "❌ CI Pipeline failed!"
            exit 1
          fi
          echo "✅ CI Pipeline passed!"

      - name: Create deployment status
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          echo "Deployment status: All checks passed ✅"
          echo "Build: ${{ github.run_id }}"
          echo "Commit: ${{ github.sha }}"
