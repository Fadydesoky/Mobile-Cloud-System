name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ============================
  # Backend (Python)
  # ============================
  backend:
    name: Backend Validation
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.9", "3.10"]

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install flask redis flake8

      - name: Syntax check
        run: |
          python -m py_compile Lab2/app.py
          python -m py_compile Lab3/app.py

      - name: Lint
        run: flake8 Lab2 Lab3 || true

  # ============================
  # Frontend (React)
  # ============================
  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: "18"
          cache: "npm"

      - name: Install deps
        working-directory: frontend
        run: npm install

      - name: Build
        working-directory: frontend
        run: npm run build || true

  # ============================
  # Docker Build
  # ============================
  docker:
    name: Docker Build Validation
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Build Docker image
        run: docker build -f Lab3/Dockerfile.basic -t mobile-cloud-system .

  # ============================
  # Deploy (GitHub Pages)
  # ============================
  deploy:
    name: Deploy Frontend (GitHub Pages)
    runs-on: ubuntu-latest
    needs: [frontend]

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: "18"

      - name: Build frontend
        run: |
          cd frontend
          npm install
          npm run build || true

      - name: Deploy to Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./frontend/build
