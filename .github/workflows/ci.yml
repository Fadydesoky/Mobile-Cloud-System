name: CI Pipeline

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:

  # ============================
  # Backend Validation
  # ============================
  backend:
    name: Backend Validation
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.9", "3.10"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - run: |
          python -m pip install --upgrade pip
          pip install flask redis flake8

      - run: |
          python -m py_compile Lab2/app.py
          python -m py_compile Lab3/app.py

      - run: |
          flake8 Lab2 Lab3 || true
      
      - name: Validate Lab4 Docker Compose
        run: |
          cd Lab4
          docker compose config

  # ============================
  # Frontend Build
  # ============================
  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install deps
        working-directory: frontend
        run: npm install

      - name: Build
        working-directory: frontend
        run: npm run build || true


  # ============================
  # Docker Validation
  # ============================
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    steps:
      - uses: actions/checkout@v4

      - run: docker build -f Lab3/Dockerfile.basic -t mobile-cloud-system .


  # ============================
  # Deploy to GitHub Pages
  # ============================
  deploy:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    needs: [frontend]
    permissions: write-all

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "18"

      - run: |
          cd frontend
          npm install
          npm run build || true

      - uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./frontend/build
