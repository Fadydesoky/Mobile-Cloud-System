apiVersion: apps/v1
kind: Deployment
metadata:
  name: lab3-app-probe
spec:
  replicas: 2
  selector:
    matchLabels:
      app: lab3-probe
  template:
    metadata:
      labels:
        app: lab3-probe
    spec:
      containers:
      - name: app
        image: lab3
        ports:
        - containerPort: 5000

        readinessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 3
          periodSeconds: 5

        livenessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 10
          periodSeconds: 10
