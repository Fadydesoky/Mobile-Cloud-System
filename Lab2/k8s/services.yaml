apiVersion: v1
kind: Service
metadata:
  name: redis-primary-service
  namespace: distributed-systems
  labels:
    app: redis
    role: primary
spec:
  type: ClusterIP
  ports:
  - name: redis
    port: 6379
    targetPort: redis
    protocol: TCP
  selector:
    app: redis
    role: primary
---
apiVersion: v1
kind: Service
metadata:
  name: redis-replica-service
  namespace: distributed-systems
  labels:
    app: redis
    role: replica
spec:
  type: ClusterIP
  ports:
  - name: redis
    port: 6380
    targetPort: redis
    protocol: TCP
  selector:
    app: redis
    role: replica
---
apiVersion: v1
kind: Service
metadata:
  name: redis-cluster-service
  namespace: distributed-systems
  labels:
    app: redis
spec:
  type: ClusterIP
  ports:
  - name: primary
    port: 6379
    targetPort: 6379
    protocol: TCP
  selector:
    app: redis
