name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.10"
  NODE_VERSION: "18"

jobs:
  # ============================
  # Backend Testing & Validation
  # ============================
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r Lab3/requirements.txt
          pip install flake8 bandit safety

      - name: Syntax check (all labs)
        run: |
          python -m py_compile Lab2/app.py
          python -m py_compile Lab3/app.py
          python -m py_compile Lab4/order-service/app.py
          python -m py_compile Lab4/product-service/app.py

      - name: Run tests with coverage
        run: |
          cd Lab3
          python -m pytest tests/ -v --cov=. --cov-report=xml --cov-report=term-missing
        continue-on-error: false

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.10'
        uses: codecov/codecov-action@v4
        with:
          files: Lab3/coverage.xml
          fail_ci_if_error: false
          verbose: true

  # ============================
  # Code Quality & Linting
  # ============================
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install linting tools
        run: |
          python -m pip install --upgrade pip
          pip install flake8 black isort mypy

      - name: Lint with flake8
        run: |
          flake8 Lab2 Lab3 Lab4 --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 Lab2 Lab3 Lab4 --count --exit-zero --max-complexity=10 --max-line-length=120 --statistics

      - name: Check formatting with black
        run: black --check --diff Lab2 Lab3 Lab4 || true

      - name: Check import sorting
        run: isort --check-only --diff Lab2 Lab3 Lab4 || true

  # ============================
  # Security Scanning
  # ============================
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install security tools
        run: |
          python -m pip install --upgrade pip
          pip install bandit safety

      - name: Run Bandit (SAST)
        run: bandit -r Lab2 Lab3 Lab4 -ll -ii -x "**/tests/**" || true

      - name: Check dependencies for vulnerabilities
        run: |
          pip install -r Lab3/requirements.txt
          safety check || true

  # ============================
  # Frontend Build & Test
  # ============================
  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci || npm install

      - name: Run linting
        working-directory: frontend
        run: npm run lint --if-present

      - name: Run tests
        working-directory: frontend
        run: npm test -- --coverage --watchAll=false --passWithNoTests

      - name: Build
        working-directory: frontend
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/build
          retention-days: 7

  # ============================
  # Docker Build & Scan
  # ============================
  docker:
    name: Docker Build & Scan
    runs-on: ubuntu-latest
    needs: [backend-test, frontend]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Lab3 image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Lab3/Dockerfile.multistage
          push: false
          tags: mobile-cloud-system:lab3
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Order Service image
        uses: docker/build-push-action@v5
        with:
          context: Lab4/order-service
          file: Lab4/order-service/Dockerfile
          push: false
          tags: mobile-cloud-system:order-service
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Product Service image
        uses: docker/build-push-action@v5
        with:
          context: Lab4/product-service
          file: Lab4/product-service/Dockerfile
          push: false
          tags: mobile-cloud-system:product-service
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'mobile-cloud-system:lab3'
          format: 'table'
          exit-code: '0'
          severity: 'CRITICAL,HIGH'

  # ============================
  # Integration Tests
  # ============================
  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [docker]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start services with Docker Compose
        run: |
          cd Lab4
          docker compose up -d --build
          sleep 10

      - name: Health check - Product Service
        run: |
          curl -f http://localhost:5001/health || exit 1

      - name: Health check - Order Service
        run: |
          curl -f http://localhost:5002/health || exit 1

      - name: Test product endpoint
        run: |
          curl -f http://localhost:5001/products/1 || exit 1

      - name: Test order creation
        run: |
          curl -f -X POST http://localhost:5002/orders \
            -H "Content-Type: application/json" \
            -d '{"product_id": 1, "quantity": 2}' || exit 1

      - name: Stop services
        if: always()
        run: |
          cd Lab4
          docker compose down

  # ============================
  # Deploy Frontend (GitHub Pages)
  # ============================
  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: [frontend, backend-test, security-scan]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: write
      pages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: frontend/build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./frontend/build
          cname: ""
